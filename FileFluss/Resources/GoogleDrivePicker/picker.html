<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose Google Drive folders — FileFluss</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
    }
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #666;
      font-size: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #d0d0d5;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #done {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 16px;
    }
    #done .checkmark {
      font-size: 48px;
    }
    #error {
      display: none;
      padding: 24px;
      color: #d70015;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading Google Picker…</div>
  </div>
  <div id="done">
    <div class="checkmark">✓</div>
    <div>Folders selected. You can close this tab.</div>
  </div>
  <div id="error"></div>

  <script>
    (function() {
      // Parse init parameters from the URL query string, set by the local server.
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var apiKey = params.get('apiKey');
      var appId = params.get('appId');
      var callbackPort = params.get('port');
      var preselectRaw = params.get('preselect');
      var preselectFileIds = preselectRaw ? preselectRaw.split(',').filter(Boolean) : [];

      function callbackURL(path) {
        return 'http://127.0.0.1:' + callbackPort + path;
      }

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        var el = document.getElementById('error');
        el.textContent = msg;
        el.style.display = 'block';
      }

      function showDone() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('done').style.display = 'flex';
      }

      if (!token || !apiKey || !callbackPort) {
        showError('Missing parameters. Please retry from FileFluss.');
        return;
      }

      function onPickerApiLoaded() {
        document.getElementById('loading').style.display = 'none';

        var myDriveView = new google.picker.DocsView()
          .setIncludeFolders(true)
          .setSelectFolderEnabled(true)
          .setMimeTypes('application/vnd.google-apps.folder')
          .setParent('root')
          .setLabel('My Drive');

        var sharedDrivesView = new google.picker.DocsView()
          .setIncludeFolders(true)
          .setSelectFolderEnabled(true)
          .setMimeTypes('application/vnd.google-apps.folder')
          .setEnableDrives(true)
          .setLabel('Shared Drives');

        if (preselectFileIds.length > 0 && typeof myDriveView.setFileIds === 'function') {
          try { myDriveView.setFileIds(preselectFileIds.join(',')); } catch (e) { /* ignore */ }
        }

        var builder = new google.picker.PickerBuilder()
          .addView(myDriveView)
          .addView(sharedDrivesView)
          .setOAuthToken(token)
          .setDeveloperKey(apiKey)
          .setAppId(appId)
          .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
          .enableFeature(google.picker.Feature.SUPPORT_DRIVES)
          .setTitle('Choose folders to connect to FileFluss')
          .setCallback(function(data) {
            if (data.action === google.picker.Action.PICKED) {
              var folders = (data.docs || []).map(function(d) {
                return { id: d.id, name: d.name, mimeType: d.mimeType };
              });
              var encoded = encodeURIComponent(JSON.stringify(folders));
              showDone();
              window.location.href = callbackURL('/callback?action=picked&folders=' + encoded);
            } else if (data.action === google.picker.Action.CANCEL) {
              showDone();
              window.location.href = callbackURL('/callback?action=cancel');
            }
          });

        var picker = builder.build();
        picker.setVisible(true);
      }

      // Load the Picker JS SDK.
      var script = document.createElement('script');
      script.src = 'https://apis.google.com/js/api.js';
      script.onload = function() {
        gapi.load('picker', { callback: onPickerApiLoaded });
      };
      script.onerror = function() {
        showError('Failed to load Google API client. Check your network connection.');
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
