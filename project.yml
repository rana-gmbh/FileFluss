name: FileFluss
options:
  bundleIdPrefix: com.rana-gmbh
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true

targets:
  FileFluss:
    type: application
    platform: macOS
    sources:
      - FileFluss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rana-gmbh.FileFluss
        PRODUCT_NAME: FileFluss
        INFOPLIST_FILE: FileFluss/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: FileFluss/Resources/FileFluss.entitlements
        COMBINE_HIDPI_IMAGES: true
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
    entitlements:
      path: FileFluss/Resources/FileFluss.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
