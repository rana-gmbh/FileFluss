name: FileFluss
options:
  bundleIdPrefix: com.rana-gmbh
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true

targets:
  FileFluss:
    type: application
    platform: macOS
    sources:
      - FileFluss
    configFiles:
      Debug: FileFluss/Resources/Secrets.xcconfig
      Release: FileFluss/Resources/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rana-gmbh.FileFluss
        PRODUCT_NAME: FileFluss
        INFOPLIST_FILE: FileFluss/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: FileFluss/Resources/FileFluss.entitlements
        COMBINE_HIDPI_IMAGES: true
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
    entitlements:
      path: FileFluss/Resources/FileFluss.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true

  FileFlussTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - FileFlussTests
    dependencies:
      - target: FileFluss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rana-gmbh.FileFlussTests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/FileFluss.app/Contents/MacOS/FileFluss
